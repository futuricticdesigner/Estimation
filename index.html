<!-- Live badge updater -->
<script>
  (function updateNavBadges() {
    const update = () => {
      const all = State.getAll();
      const get = (status) => all.filter(e => e.status === status).length;
      const el = (id, val) => { const e = document.getElementById(id); if(e) e.textContent = val; };
      el('nav-count',    all.length);
      el('nav-draft',    get('draft'));
      el('nav-sent',     get('sent'));
      el('nav-approved', get('approved'));
    };
    // Run once after app init
    document.addEventListener('DOMContentLoaded', () => setTimeout(update, 100));
    // Re-run after each navigation
    window.addEventListener('hashchange', () => setTimeout(update, 200));
  })();
</script>
